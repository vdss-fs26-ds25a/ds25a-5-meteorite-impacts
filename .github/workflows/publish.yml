on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install librsvg
        run: sudo apt-get install librsvg2-bin

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Render Quarto project
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: docs

      - name: Copy data profiling report
        run: cp docs/meteorite_report.html docs/build/meteorite_report.html

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies and Shinylive
        working-directory: viz_design
        run: |
          uv sync
          uv pip install shinylive

      - name: Download data
        working-directory: data
        run: uv run python data.py

      - name: Copy cleaned data into Shiny app bundle
        run: |
          mkdir -p viz_design/data/processed
          cp data/processed/Meteorite_Landings_cleaned.csv viz_design/data/processed/Meteorite_Landings_cleaned.csv

      - name: Export Shiny app to static site
        working-directory: viz_design
        run: uv run shinylive export . ../docs/build/viz-design

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
